
services:
  luanti-server:
    image: linuxserver/luanti:latest
    container_name: luanti-voxelibre-server
    restart: unless-stopped
    ports:
      - "30000:30000/udp"
    volumes:
      # El server lee --config main-config/minetest.conf (ver init-luanti-config/run del image)
      - ./server/config/luanti-original.conf:/config/.minetest/main-config/minetest.conf
      - ./server/mods:/config/.minetest/mods
      - ./server/worlds:/config/.minetest/worlds
      - ./server/games:/config/.minetest/games
      - ./server/backups:/backups
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Santiago
      - CLI_ARGS=--worldname original
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -tulpn | grep :30000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - luanti-network

  # Backup service opcional con n8n integration
  backup-cron:
    image: alpine:latest
    container_name: luanti-voxelibre-backup
    restart: unless-stopped
    volumes:
      - ./server/worlds:/worlds:ro
      - ./server/backups:/backups
      - ./scripts:/scripts:ro
    environment:
      - TZ=America/Santiago
    command: >
      sh -c "
        apk add --no-cache dcron tar gzip findutils sqlite rsync bash &&
        echo '0 */12 * * * bash /scripts/backup.sh' > /tmp/crontab.txt &&
        echo '0 3 * * * sh /scripts/rotate-backups-container.sh' >> /tmp/crontab.txt &&
        crontab /tmp/crontab.txt &&
        crond -f -d 8
      "
    depends_on:
      - luanti-server
    networks:
      - luanti-network

  # Discord notifier - Notificaciones de conexiones de jugadores
  discord-notifier:
    image: alpine:latest
    container_name: luanti-discord-notifier
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/scripts:ro
    environment:
      - TZ=America/Santiago
      - CONTAINER_NAME=luanti-voxelibre-server
      - SERVER_LABEL=Wetlands 🌱
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    command: >
      sh -c "
        apk add --no-cache curl docker-cli bash &&
        bash /scripts/discord-notifier.sh
      "
    depends_on:
      - luanti-server
    networks:
      - luanti-network

  # Discord notifier para Valdivia 2.0
  discord-notifier-valdivia:
    image: alpine:latest
    container_name: luanti-discord-notifier-valdivia
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/scripts:ro
    environment:
      - TZ=America/Santiago
      - CONTAINER_NAME=luanti-valdivia-server
      - SERVER_LABEL=Valdivia 2.0 🏙️
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    command: >
      sh -c "
        apk add --no-cache curl docker-cli bash &&
        bash /scripts/discord-notifier.sh
      "
    depends_on:
      - luanti-valdivia
    networks:
      - luanti-network

  # =============================================
  # VALDIVIA 2.0 - Ciudad real desde OpenStreetMap
  # =============================================
  # El script /etc/s6-overlay/s6-rc.d/svc-luanti/run del image linuxserver/luanti
  # hardcodea `--port 30000` antes de CLI_ARGS para el healthcheck (nc -zu localhost 30000).
  # Esto causa que con CLI_ARGS=--worldname valdivia --port 30001, Luanti abra AMBOS puertos
  # y se anuncie duplicado en servers.luanti.org. Ver server/container-overrides/svc-luanti/run
  # para el override que elimina ese --port hardcodeado.
  luanti-valdivia:
    image: linuxserver/luanti:latest
    container_name: luanti-valdivia-server
    restart: unless-stopped
    ports:
      - "30001:30001/udp"
    volumes:
      # Override del script run del image (elimina --port 30000 hardcodeado)
      - ./server/container-overrides/svc-luanti/run:/etc/s6-overlay/s6-rc.d/svc-luanti/run:ro
      # IMPORTANTE: el server lee --config main-config/minetest.conf (ver init-luanti-config/run
      # del image linuxserver). Montar en /config/.minetest/minetest.conf NO se lee. Por eso va aquí.
      - ./server/config/luanti-valdivia.conf:/config/.minetest/main-config/minetest.conf
      - ./server/mods:/config/.minetest/mods
      - ./server/worlds/valdivia:/config/.minetest/worlds/valdivia
      - ./server/games:/config/.minetest/games
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Santiago
      - CLI_ARGS=--worldname valdivia --port 30001
    depends_on:
      - luanti-server
    networks:
      - luanti-network

  # =============================================
  # GAELSIN - Mundo de supervivencia VoxeLibre
  # =============================================
  # Mundo nuevo generado desde cero con seed=GAELSIN (mapgen v7). Supervivencia
  # pura: PvP activo, mobs hostiles de noche, creepers bloqueados, sin proteccion
  # de areas. NO clona ningun mundo. Setup/reset via scripts/setup-gaelsin-world.sh
  # y scripts/reset-gaelsin.sh.
  luanti-gaelsin:
    image: linuxserver/luanti:latest
    container_name: luanti-gaelsin-server
    restart: unless-stopped
    ports:
      - "30002:30000/udp"
    volumes:
      - ./server/config/luanti-gaelsin.conf:/config/.minetest/main-config/minetest.conf
      - ./server/mods:/config/.minetest/mods
      - ./server/worlds/gaelsin:/config/.minetest/worlds/gaelsin
      - ./server/games:/config/.minetest/games
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Santiago
      - CLI_ARGS=--worldname gaelsin
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -tulpn | grep :30000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - luanti-server
    networks:
      - luanti-network

  # Discord notifier para GAELSIN
  discord-notifier-gaelsin:
    image: alpine:latest
    container_name: luanti-discord-notifier-gaelsin
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/scripts:ro
    environment:
      - TZ=America/Santiago
      - CONTAINER_NAME=luanti-gaelsin-server
      - SERVER_LABEL=GAELSIN ⚔️
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    command: >
      sh -c "
        apk add --no-cache curl docker-cli bash &&
        bash /scripts/discord-notifier.sh
      "
    depends_on:
      - luanti-gaelsin
    networks:
      - luanti-network

  # =============================================
  # LLANURA CTF - Mundo plano para captura la bandera
  # =============================================
  # Llanura 100% plana de pura tierra (mod wetlands_flatworld sobre singlenode)
  # para jugar captura la bandera (mod wetlands_ctf). Modo creativo.
  luanti-ctf:
    image: linuxserver/luanti:latest
    container_name: luanti-ctf-server
    restart: unless-stopped
    ports:
      - "30003:30000/udp"
    volumes:
      - ./server/config/luanti-ctf.conf:/config/.minetest/main-config/minetest.conf
      - ./server/mods:/config/.minetest/mods
      - ./server/worlds/ctf:/config/.minetest/worlds/ctf
      - ./server/games:/config/.minetest/games
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Santiago
      - CLI_ARGS=--worldname ctf
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -tulpn | grep :30000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - luanti-server
    networks:
      - luanti-network

  # Discord notifier para Llanura CTF
  discord-notifier-ctf:
    image: alpine:latest
    container_name: luanti-discord-notifier-ctf
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/scripts:ro
    environment:
      - TZ=America/Santiago
      - CONTAINER_NAME=luanti-ctf-server
      - SERVER_LABEL=Llanura CTF ⚔️
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    command: >
      sh -c "
        apk add --no-cache curl docker-cli bash &&
        bash /scripts/discord-notifier.sh
      "
    depends_on:
      - luanti-ctf
    networks:
      - luanti-network

networks:
  luanti-network:
    driver: bridge
