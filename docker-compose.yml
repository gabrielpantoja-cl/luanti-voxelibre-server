
services:
  luanti-server:
    image: linuxserver/luanti:latest
    container_name: luanti-voxelibre-server
    restart: unless-stopped
    ports:
      - "30000:30000/udp"
    volumes:
      - ./server/config/luanti.conf:/config/.minetest/minetest.conf
      - ./server/mods:/config/.minetest/mods
      - ./server/worlds:/config/.minetest/worlds
      - ./server/games:/config/.minetest/games
      - ./server/backups:/backups
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Santiago
      - CLI_ARGS=--worldname world
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -tulpn | grep :30000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - luanti-network

  # Backup service opcional con n8n integration
  backup-cron:
    image: alpine:latest
    container_name: luanti-voxelibre-backup
    restart: unless-stopped
    volumes:
      - ./server/worlds:/worlds:ro
      - ./server/backups:/backups
      - ./scripts:/scripts:ro
    environment:
      - TZ=America/Santiago
    command: >
      sh -c "
        apk add --no-cache dcron tar gzip findutils sqlite rsync bash &&
        echo '0 */12 * * * bash /scripts/backup.sh' > /tmp/crontab.txt &&
        echo '0 3 * * * sh /scripts/rotate-backups-container.sh' >> /tmp/crontab.txt &&
        crontab /tmp/crontab.txt &&
        crond -f -d 8
      "
    depends_on:
      - luanti-server
    networks:
      - luanti-network

  # Discord notifier - Notificaciones de conexiones de jugadores
  discord-notifier:
    image: alpine:latest
    container_name: luanti-discord-notifier
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/scripts:ro
    environment:
      - TZ=America/Santiago
      - CONTAINER_NAME=luanti-voxelibre-server
      - SERVER_LABEL=Wetlands 🌱
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    command: >
      sh -c "
        apk add --no-cache curl docker-cli bash &&
        bash /scripts/discord-notifier.sh
      "
    depends_on:
      - luanti-server
    networks:
      - luanti-network

  # Discord notifier para Valdivia 2.0
  discord-notifier-valdivia:
    image: alpine:latest
    container_name: luanti-discord-notifier-valdivia
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/scripts:ro
    environment:
      - TZ=America/Santiago
      - CONTAINER_NAME=luanti-valdivia-server
      - SERVER_LABEL=Valdivia 2.0 🏙️
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    command: >
      sh -c "
        apk add --no-cache curl docker-cli bash &&
        bash /scripts/discord-notifier.sh
      "
    depends_on:
      - luanti-valdivia
    networks:
      - luanti-network

  # =============================================
  # VALDIVIA 2.0 - Ciudad real desde OpenStreetMap
  # =============================================
  luanti-valdivia:
    image: linuxserver/luanti:latest
    container_name: luanti-valdivia-server
    restart: unless-stopped
    ports:
      - "30001:30000/udp"
    volumes:
      - ./server/config/luanti-valdivia.conf:/config/.minetest/minetest.conf
      - ./server/mods:/config/.minetest/mods
      - ./server/worlds/valdivia:/config/.minetest/worlds/valdivia
      - ./server/games:/config/.minetest/games
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Santiago
      - CLI_ARGS=--worldname valdivia
    depends_on:
      - luanti-server
    networks:
      - luanti-network

  # =============================================
  # INFIERNO - Mundo caos (copia destructible de Wetlands)
  # =============================================
  # Snapshot del mundo principal donde se puede destruir, atacar y quemar
  # libremente. PvP, fuego, TNT y creepers activos. Reset periodico via
  # scripts/reset-infierno.sh.
  luanti-infierno:
    image: linuxserver/luanti:latest
    container_name: luanti-infierno-server
    restart: unless-stopped
    ports:
      - "30002:30000/udp"
    volumes:
      - ./server/config/luanti-infierno.conf:/config/.minetest/minetest.conf
      - ./server/mods:/config/.minetest/mods
      - ./server/worlds/infierno:/config/.minetest/worlds/infierno
      - ./server/games:/config/.minetest/games
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Santiago
      - CLI_ARGS=--worldname infierno
    healthcheck:
      test: ["CMD", "sh", "-c", "netstat -tulpn | grep :30000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - luanti-server
    networks:
      - luanti-network

  # Discord notifier para Infierno
  discord-notifier-infierno:
    image: alpine:latest
    container_name: luanti-discord-notifier-infierno
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/scripts:ro
    environment:
      - TZ=America/Santiago
      - CONTAINER_NAME=luanti-infierno-server
      - SERVER_LABEL=INFIERNO
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    command: >
      sh -c "
        apk add --no-cache curl docker-cli bash &&
        bash /scripts/discord-notifier.sh
      "
    depends_on:
      - luanti-infierno
    networks:
      - luanti-network

networks:
  luanti-network:
    driver: bridge
