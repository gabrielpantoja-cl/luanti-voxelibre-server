server {
    server_name luanti.gabrielpantoja.cl;

    root /home/gabriel/luanti-voxelibre-server/server/landing-page;
    index index.html;

    # Serve landing page files
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache: JS and CSS - 1 hour
    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Cache: JSON data - 5 minutes (gallery updates visible quickly)
    location ~* \.json$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }

    # Cache: Images - 1 year (rarely change)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/luanti.gabrielpantoja.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/luanti.gabrielpantoja.cl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = luanti.gabrielpantoja.cl) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name luanti.gabrielpantoja.cl;
    return 404;
}
