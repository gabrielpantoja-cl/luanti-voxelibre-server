# ===========================================
# CONFIGURACION SERVIDOR INFIERNO
# ===========================================
# Mundo caos: copia de Wetlands (puerto 30000) donde se puede destruir libremente
# sin afectar al mundo principal. PvP, fuego, TNT, creepers todos activos.
# Reset periodico mediante scripts/reset-infierno.sh
# Nombre sugerido por el hijo de Gabriel.

# Informacion basica del servidor
server_name = INFIERNO | Mundo Caos para Destruir
server_description = Copia destructible de Wetlands. PvP activo, fuego, TNT y creepers. El mundo se reinicia periodicamente desde el snapshot del mundo original.
motd = Bienvenid@ al INFIERNO! Aqui PUEDES destruir, atacar y quemar todo. PvP activo. El mundo se reinicia periodicamente.
server_address = luanti.gabrielpantoja.cl
server_url = https://gabrielpantoja.cl
world_name = infierno
worldname = infierno

# Anunciar en lista publica (opcional - puede dejarse en false al inicio)
server_announce = false
server_keywords = chaos,pvp,destruction,sandbox,creative,spanish

# Configuracion de red - el container escucha en 30000 internamente
# El mapeo a puerto 30002 del host se define en docker-compose.yml
bind_address = 0.0.0.0
port = 30000
max_users = 15
default_privs = interact,shout,fly,fast,noclip,give,creative,spawn
strict_protocol_version_checking = false

# === MODO CAOS - Todo habilitado ===
creative_mode = true
enable_damage = true
enable_pvp = true
enable_fire = true
enable_tnt = true
enable_rollback_recording = false
keepInventory = false

# VoxeLibre creativo
mcl_enable_creative_mode = true
mcl_creative_is_survival_like = false
give_initial_stuff = false
initial_stuff =

# Spawn (mismo que mundo principal para que el spawn area sea reconocible)
static_spawnpoint = 0,15,0
respawn_auto = true

# Seguridad
disallow_empty_password = false
secure.enable_security = true
secure.trusted_mods =
disable_escape_sequences = true

# Chat
default_language = es
chat_message_format = <@name> @message
chat_message_max_size = 500

# Rendimiento
dedicated_server_step = 0.09
active_object_send_range_blocks = 4
active_block_range = 2
max_block_send_distance = 8
max_block_generate_distance = 10
time_speed = 72
num_emerge_threads = 2
server_unload_unused_data_timeout = 600

# Mapgen - mismo que el mundo principal (los chunks ya existen, no se regenera)
default_game = mineclone2
mg_name = v7
mg_flags = caves,light,decorations,biomes
fixed_map_seed = 12345678901234567890

# === MOBS - Maximo caos ===
mobs_spawn = true
only_peaceful_mobs = false
mcl_mob_cap_monster = 100
mcl_mob_cap_hostile = 400
mcl_mob_cap_animal = 10
mcl_mob_cap_ambient = 15
mcl_mob_cap_total = 600
mob_spawners_in_dungeons = true
mg_dungeons = true
mobs_griefing = true
mobs_spawn_protected = true

# Anti-grief MINIMO (este es el mundo de destruccion)
max_objects_per_block = 256
max_forceloaded_blocks = 16

# Restricciones cliente (mantener seguridad basica)
enable_client_modding = false
csm_restriction_flags = 63
csm_restriction_noderange = 0
max_simultaneous_block_sends_per_client = 6
max_simultaneous_block_sends_server_total = 40
client_unload_unused_data_timeout = 300
server_map_save_interval = 60

# Anti-spam suave
chat_message_count_per_player_per_5min = 100
kick_msg_crash_msgqueue = "Error de conexion - reconectate"
kick_msg_shutdown = "Infierno en mantenimiento - resetting world"

# Logs
debug_log_level = warning
log_level = warning

# Administracion
name = gabo
admin_name = gabo
admin_privs = server,privs,ban,kick,teleport,give,settime,worldedit,fly,fast,noclip,debug,password,rollback_check

# ===========================================
# MODS HABILITADOS (mismo set que Wetlands)
# Diferencias clave vs luanti.conf:
#   - wetlands_no_creeper = false (creepers ON para chaos)
#   - pvp_arena = false (todo el mundo es PvP)
#   - voxelibre_protection = false (sin proteccion en infierno)
# ===========================================

# Mods de jugadores y reglas
load_mod_wetlands_newplayer = true
load_mod_server_rules = true
load_mod_mcl_back_to_spawn = true

# NPCs y decoracion (heredados del snapshot del mundo)
load_mod_wetlands_npcs = true
load_mod_wetlands_music = true
load_mod_wetlands_christmas = true
load_mod_3dforniture = false
load_mod_mcl_decor = false
load_mod_mypark = true

# CHAOS overrides - lo que distingue al infierno
load_mod_wetlands_no_creeper = false   # Creepers spawneando para destruir
load_mod_pvp_arena = false             # No hay arena - todo el mundo lo es
load_mod_voxelibre_protection = false  # Sin proteccion de areas
load_mod_protector = false             # Sin protector blocks

# Skins
load_mod__world_folder_media = true
load_mod_mcl_custom_world_skins = true

# Vehiculos (para destruir con ellos)
load_mod_automobiles_lib = true
load_mod_automobiles_vespa = true
load_mod_automobiles_beetle = true
load_mod_automobiles_motorcycle = true
load_mod_automobiles_buggy = true

# WorldEdit (admin para reconstruir si se pasa el caos)
load_mod_worldedit = true
load_mod_worldedit_commands = true
load_mod_worldedit_shortcommands = true

# Halloween (zombies y fantasmas suman al ambiente)
load_mod_halloween_ghost = true
load_mod_halloween_zombies = true
load_mod_broom_racing = true

# Otros
load_mod_celevator = true
load_mod_chess = true
load_mod_voxelibre_tv = true
load_mod_auto_road_builder = true
load_mod_mcl_potions_hotfix = true

# === CTF GUNS - El sentido principal del infierno ===
load_mod_controls = true
load_mod_ctf_core = true
load_mod_rawf = true
load_mod_grenades = true
load_mod_ctf_ranged = true
load_mod_darkness_nerf = false  # KILL-SWITCH (depends on Minetest Game `default`)

# Mods deshabilitados explicitamente (incompatibles con VoxeLibre)
load_mod_motorboat = false
load_mod_biofuel = false
load_mod_mobkit = false
load_mod_animal_sanctuary = false
load_mod_creative_force = false
load_mod_home_teleport = false
load_mod_sethome = false
load_mod_area_protection = false
