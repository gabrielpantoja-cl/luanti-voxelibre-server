# ===========================================
# CONFIGURACION SERVIDOR VALDIVIA 2.0
# ===========================================
# Mundo generado con Arnis desde OpenStreetMap
# Recreacion de Valdivia, Chile

# Informacion basica del servidor
server_name = Valdivia [Chile]
server_description = Valdivia, Chile recreada en voxels desde OpenStreetMap. Recorre sus calles, cruza sus ríos y explora la ciudad con otros jugadores. Modo creativo.
motd = Bienvenid@ a Valdivia [Chile]! Explora la capital de Los Ríos y haz amigos en la ciudad más linda de Chile.
server_address = luanti.gabrielpantoja.cl
server_url = https://luanti.gabrielpantoja.cl
world_name = valdivia
worldname = valdivia

# Anunciar en lista publica de Luanti
server_announce = true

# Configuracion de red
# bind_address = 0.0.0.0  # Comentado: usar default (::) para IPv4+IPv6, igual que Wetlands
port = 30001
max_users = 20
strict_protocol_version_checking = false

# Configuracion del juego - EXPLORACION (sin vuelo global, con daño)
creative_mode = false
enable_damage = true
enable_pvp = true
enable_fire = false
enable_tnt = false
enable_rollback_recording = false
keepInventory = true

# VoxeLibre: Modo creativo nativo
mcl_enable_creative_mode = false
mcl_creative_is_survival_like = false
give_initial_stuff = false
initial_stuff =

# Proteccion y moderacion
disallow_empty_password = false
secure.enable_security = true
disable_escape_sequences = true

# Chat
default_language = es
chat_message_format = <@name> @message
chat_message_max_size = 500

# Rendimiento — ampliado para maqueta de ciudad explorable (singlenode, sin mobs)
# Valdivia es un mundo fijo pre-generado: no gasta CPU en mapgen ni mobs, asi que
# subimos los limites heredados de Wetlands para que se vea la ciudad de lejos.
dedicated_server_step = 0.09
active_object_send_range_blocks = 8        # era 4 — vehiculos/objetos visibles mas lejos
active_block_range = 4                      # era 3
max_block_send_distance = 20                # era 10 — TECHO de vision: 320 nodos (antes 160)
max_block_generate_distance = 20            # era 10 — alineado con send (singlenode no genera)
time_speed = 72
num_emerge_threads = 2
server_unload_unused_data_timeout = 600

# Mapgen: singlenode (mundo importado desde Arnis, no genera terreno nuevo)
default_game = mineclone2
mg_name = singlenode

# Spawn point (generado por Arnis v2.9.0 - Plaza de la República)
static_spawnpoint = 3766,-4,-3249
respawn_auto = true

# Configuracion de mobs - DESHABILITADOS (ciudad de exploracion)
mobs_spawn = false
only_peaceful_mobs = true

# Seguridad para ninos
enable_client_modding = false
csm_restriction_flags = 63
csm_restriction_noderange = 0
max_simultaneous_block_sends_per_client = 40   # era 6 — default Luanti; elimina el pop-in al volar
max_simultaneous_block_sends_server_total = 40
server_map_save_interval = 60

# Mensajes
kick_msg_crash_msgqueue = "Error de conexion - reconectate en un momento"
kick_msg_shutdown = "Servidor Valdivia en mantenimiento - vuelve pronto"

# Logs
debug_log_level = warning
log_level = warning

# Administrador
name = gabo
admin_name = gabo

# Privilegios para nuevos jugadores (creativo completo)
default_privs = interact,shout,fast,creative,spawn,teleport

# ===========================================
# MODS HABILITADOS (minimos para exploracion)
# ===========================================
load_mod_wetlands_newplayer = false
load_mod_valdivia_newplayer = true
load_mod_server_rules = true
load_mod_valdivia_aliases = true  # aliases mcl_* → mesecons_* para nodos del mapa generado con Arnis

# Teletransportador de la ciudad (pedestal + comando /ir a 4 ubicaciones)
load_mod_valdivia_teleporter = false  # deshabilitado temporalmente — coordenadas desactualizadas post-Arnis

# Skins
load_mod__world_folder_media = true
load_mod_mcl_custom_world_skins = true

# WorldEdit (para enriquecimiento manual)
load_mod_worldedit = true
load_mod_worldedit_commands = true
load_mod_worldedit_shortcommands = true

# Vehiculos para explorar la ciudad
load_mod_automobiles_lib = true
load_mod_automobiles_vespa = true
load_mod_automobiles_beetle = true
load_mod_automobiles_motorcycle = true
load_mod_automobiles_buggy = true
load_mod_automobiles_trans_am = true
load_mod_automobiles_roadster = true
load_mod_automobiles_coupe = true
load_mod_automobiles_catrelle = true
load_mod_automobiles_delorean = true

# Mods pesados DESHABILITADOS (no necesarios para exploracion)
load_mod_wetlands_npcs = false
load_mod_wetlands_music = false
load_mod_wetlands_christmas = false
load_mod_wetlands_no_creeper = false
load_mod_wetlands_fixlight = true
load_mod_pvp_arena = false
load_mod_chess = false
load_mod_celevator = false
load_mod_halloween_ghost = false
load_mod_halloween_zombies = false
load_mod_broom_racing = false
load_mod_auto_road_builder = false
load_mod_voxelibre_protection = false
load_mod_mcl_potions_hotfix = false
