# ===========================================
# CONFIGURACIÓN SERVIDOR WETLANDS 🌱
# ===========================================

# Información básica del servidor
server_name = Wetlands 🌱 | Servidor Creativo y Compasivo
server_description = Un mundo creativo con mobs hostiles de noche. Inventario infinito + supervivencia. Para niños 7+ años.
motd = ¡Bienvenid@ a Vegan Wetlands! 🌱 Aquí creamos, cuidamos animales y aprendemos juntos sobre compasión.
server_address = luanti.gabrielpantoja.cl
server_url = https://gabrielpantoja.cl
world_name = world
worldname = world

# Configuración para aparecer en lista pública de servidores
server_announce = true
announce_server_list_url = https://servers.minetest.net/announce
serverlist_url = https://servers.minetest.net/list
enable_server_list = true
server_up_time = 24/7

# Tags para categorización en lista pública
server_keywords = creative,compassionate,spanish,kids,educational,animals,no-pvp,family-friendly

# Configuración de red
bind_address = 0.0.0.0
port = 30000
max_users = 20
default_privs = interact,shout,fly,fast,noclip,give,creative,spawn
strict_protocol_version_checking = false

# Configuración del juego - MODO CREATIVO CON MOBS HOSTILES
creative_mode = true
enable_damage = true
enable_pvp = false
enable_fire = false
enable_tnt = false
enable_rollback_recording = true
keepInventory = true

# Modo creativo sin dar items iniciales (inventario infinito disponible)
player_transfer_distance = 0
item_entity_ttl = 0

# VoxeLibre: Modo creativo nativo con inventario infinito
mcl_enable_creative_mode = true
mcl_creative_is_survival_like = false
give_initial_stuff = false
initial_stuff =

# Protección y moderación
static_spawnpoint = 0,10,0
disallow_empty_password = false
secure.enable_security = true
secure.trusted_mods = animal_sanctuary,vegan_food,education_blocks,areas,vegan_replacements,home_teleport
disable_escape_sequences = true

# Chat y comunicación (en español)
default_language = es
chat_message_format = <@name> @message
chat_message_max_size = 500
chatcommands_msg_collaboration = false

# Rendimiento optimizado para modo creativo
dedicated_server_step = 0.09
active_object_send_range_blocks = 4
active_block_range = 2                    # Reducir CPU load (era 3)
max_block_send_distance = 8               # Reducir bandwidth (era 12)
max_block_generate_distance = 10          # Optimizar generación
time_speed = 72
num_emerge_threads = 2                    # Multi-thread para generación
server_unload_unused_data_timeout = 600   # 10 min cache para creatividad

# Configuración del mundo
default_game = mineclone2
mg_name = v7
mg_flags = caves,light,decorations,biomes
enable_mapgen_debug_info = false
fixed_map_seed = 12345678901234567890

# ===============================================
# CONFIGURACIÓN DE MOBS - HOSTILES HABILITADOS (excepto Creeper)
# ===============================================
# Mobs hostiles spawnean de noche. Creeper bloqueado por mod wetlands_no_creeper.

mobs_spawn = true
only_peaceful_mobs = false
mcl_mob_cap_monster = 70
mcl_mob_cap_hostile = 300
mcl_mob_cap_animal = 10
mcl_mob_cap_ambient = 15
mcl_mob_cap_water = 8
mcl_mob_cap_water_ambient = 20
mcl_mob_cap_non_hostile = 300
mcl_mob_cap_total = 500
mob_spawners_in_dungeons = true
mg_dungeons = true
mobs_griefing = false
mobs_spawn_protected = false

# Mods y contenido
load_mod_animal_sanctuary = false
load_mod_vegan_foods = true
load_mod_vegan_food = true
load_mod_education_blocks = true
load_mod_protector = true

# ===========================================
# CONFIGURACIÓN MOD PROTECTOR 🛡️
# ===========================================

# Radio de protección de bloques protectores (default: 5)
protector_radius = 8

# Habilitar herramientas de administrador para protector
protector_admin_enabled = true

# Permitir que admins coloquen protectores sin restricciones
protector_admin_bypass = true

# Mostrar HUD de protección a los jugadores
protector_hud = true

# Mensajes de protección en chat
protector_msg = true

# Tiempo en segundos entre colocaciones de protectores (anti-spam)
protector_delay = 2
load_mod_vegan_replacements = true
load_mod_home_teleport = false
load_mod_sethome = false
load_mod_mcl_back_to_spawn = false  # Missing mcl_spawn dependency
load_mod_creative_force = false  # DESHABILITADO - Usando modo creativo nativo de VoxeLibre
load_mod_server_rules = true
load_mod_mcl_decor = false  # Missing multiple VoxeLibre dependencies
load_mod_area_protection = false
load_mod_voxelibre_protection = true

# Mods de transporte sostenible - DESHABILITADOS (incompatibles con VoxeLibre)
load_mod_motorboat = false
load_mod_biofuel = false
load_mod_mobkit = false

# === AUTOMOBILES PACK (VoxeLibre Adapted) - Nov 15, 2025 ===
# Sustainable transport vehicles with plant-based fuel
load_mod_automobiles_lib = true
load_mod_automobiles_vespa = true
load_mod_automobiles_beetle = true
load_mod_automobiles_motorcycle = true
load_mod_automobiles_trans_am = false
load_mod_automobiles_roadster = false
load_mod_automobiles_coupe = false
load_mod_automobiles_buggy = true
load_mod_automobiles_catrelle = false
load_mod_automobiles_delorean = false

# Mods de eventos especiales - Halloween 🎃
load_mod_halloween_ghost = true
load_mod_broom_racing = true
load_mod_halloween_zombies = true

# Mods de decoración y muebles
load_mod_3dforniture = false  # Missing mcl_core, mcl_buckets dependencies

# Hotfix para bug de mcl_potions (crash con pociones invisibilidad)
load_mod_mcl_potions_hotfix = true

# Configuración de spawn
static_spawnpoint = 0,15,0
respawn_auto = true

# Anti-grief básico
max_objects_per_block = 256
max_forceloaded_blocks = 16

# ===============================================
# CONFIGURACIÓN ESPECIAL PARA NIÑOS 👶🛡️
# ===============================================

# Restricciones de seguridad para menores
enable_client_modding = false              # Sin mods del cliente
csm_restriction_flags = 63                 # Máximas restricciones
csm_restriction_noderange = 0              # Sin acceso a nodos

# Protección automática y timeouts seguros
max_simultaneous_block_sends_per_client = 6     # Evitar sobrecarga
max_simultaneous_block_sends_server_total = 40  # Límite servidor
client_unload_unused_data_timeout = 300         # 5 min cliente
server_map_save_interval = 60                   # Guardar cada minuto

# Configuración de chat segura para niños
chat_message_count_per_player_per_5min = 100    # Anti-spam suave
kick_msg_crash_msgqueue = "Error de conexión - reconéctate en un momento"
kick_msg_shutdown = "Servidor en mantenimiento - vuelve pronto 🌱"

# Mensajes automáticos del servidor con reglas
server_chatcommands = true

# Mensajes de reglas que aparecen periódicamente
# MOTD con reglas básicas al conectarse
motd = ¡Bienvenid@ a Wetlands! 🌱\nREGLAS: 1)No molestar 2)Nombre apropiado 3)Respeto 4)Ser compasivo\nComandos útiles: /reglas /filosofia /santuario

# Configuración de log
debug_log_level = warning
log_level = warning

# Administrador del servidor
name = gabo

# Privilegios completos para el administrador
# El usuario con name = gabo obtiene automáticamente todos los privilegios
# Privilegios adicionales para asegurar acceso completo
admin_name = gabo
admin_privs = server,privs,ban,kick,teleport,give,settime,worldedit,fly,fast,noclip,debug,password,rollback_check
# Elevator System - Realistic elevator mod with doors, sounds, and control systems
load_mod_celevator = true

# Chess Mod - Tablero de ajedrez real para jugar con amigos
load_mod_chess = true
load_mod_auto_road_builder = true

# === SISTEMA DE SKINS PERSONALIZADOS - Dec 7, 2025 ===
# Permite agregar skins customizados desde la carpeta del mundo
load_mod__world_folder_media = true
load_mod_mcl_custom_world_skins = true

# Wetlands custom mods
load_mod_wetlands_npcs = true
load_mod_wetlands_newplayer = true
load_mod_wetlands_music = true
load_mod_wetlands_christmas = true
load_mod_wetlands_no_creeper = true
