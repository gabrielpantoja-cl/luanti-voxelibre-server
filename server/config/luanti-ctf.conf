# ===========================================
# CONFIGURACION SERVIDOR LLANURA CTF
# ===========================================
# Cuarto mundo: llanura 100% plana de pura tierra (mod wetlands_flatworld sobre
# mapgen singlenode) para jugar "captura la bandera" (mod wetlands_ctf).
# Modo creativo. El mapeo a puerto 30003 del host se define en docker-compose.yml.

# Informacion basica del servidor
server_name = Llanura CTF | Captura la Bandera
server_description = Llanura totalmente plana de tierra para jugar captura la bandera. Dos equipos, dos banderas, modo creativo.
motd = Bienvenid@ a la Llanura CTF! Mundo plano para captura la bandera. Escribe /ctf entrar para unirte a un equipo.
server_address = luanti.gabrielpantoja.cl
server_url = https://gabrielpantoja.cl
world_name = ctf
worldname = ctf

# No anunciar en lista publica (por ahora)
server_announce = false
server_keywords = ctf,capturetheflag,creative,flat,spanish

# Configuracion de red - el container escucha en 30000 internamente
bind_address = 0.0.0.0
port = 30000
max_users = 20
strict_protocol_version_checking = false

# === MODO CREATIVO + COMBATE CTF ===
creative_mode = true
enable_damage = true              # necesario para el combate de captura la bandera
enable_pvp = true                 # PvP libre (lo gobierna el mod wetlands_ctf)
enable_fire = false
enable_tnt = false
enable_rollback_recording = false
keepInventory = true

# VoxeLibre creativo
mcl_enable_creative_mode = true
mcl_creative_is_survival_like = false
give_initial_stuff = false
initial_stuff =

# Mapgen: singlenode (el terreno plano lo genera wetlands_flatworld)
default_game = mineclone2
mg_name = singlenode

# Spawn: justo sobre la superficie de tierra (y=0)
static_spawnpoint = 0,2,0
respawn_auto = true

# Mobs DESHABILITADOS (llanura limpia)
mobs_spawn = false
only_peaceful_mobs = true

# Seguridad
disallow_empty_password = false
secure.enable_security = true
secure.trusted_mods =
disable_escape_sequences = true

# Chat
default_language = es
chat_message_format = <@name> @message
chat_message_max_size = 500

# Rendimiento (mundo plano liviano)
dedicated_server_step = 0.09
active_object_send_range_blocks = 4
active_block_range = 3
max_block_send_distance = 12
max_block_generate_distance = 10
time_speed = 72
num_emerge_threads = 2
server_unload_unused_data_timeout = 600

# Restricciones cliente (seguridad basica)
enable_client_modding = false
csm_restriction_flags = 63
csm_restriction_noderange = 0
max_simultaneous_block_sends_per_client = 40
max_simultaneous_block_sends_server_total = 40
server_map_save_interval = 60

# Mensajes
kick_msg_crash_msgqueue = "Error de conexion - reconectate en un momento"
kick_msg_shutdown = "Llanura CTF en mantenimiento - vuelve pronto"

# Logs
debug_log_level = warning
log_level = warning

# Administracion
name = gabo
admin_name = gabo
admin_privs = server,privs,ban,kick,teleport,give,settime,worldedit,fly,fast,noclip,debug,password,rollback_check

# Privilegios para nuevos jugadores (creativo completo)
default_privs = interact,shout,fly,fast,noclip,creative,spawn,give,teleport

# ===========================================
# MODS HABILITADOS
# ===========================================

# Generacion del mundo plano + juego captura la bandera
load_mod_wetlands_flatworld = true
load_mod_wetlands_ctf = true

# Jugadores, reglas y skins
load_mod_wetlands_newplayer = true
load_mod_server_rules = true
load_mod_wetlands_fixlight = true
load_mod__world_folder_media = true
load_mod_mcl_custom_world_skins = true

# WorldEdit (admin, para armar/ajustar las bases)
load_mod_worldedit = true
load_mod_worldedit_commands = true
load_mod_worldedit_shortcommands = true

# === CTF GUNS - combate a distancia para la captura la bandera ===
load_mod_controls = true
load_mod_ctf_core = true
load_mod_rawf = true
load_mod_grenades = true
load_mod_ctf_ranged = true
load_mod_darkness_nerf = false    # KILL-SWITCH (depende de Minetest Game `default`)

# Mods pesados / no necesarios DESHABILITADOS
load_mod_wetlands_npcs = false
load_mod_wetlands_music = false
load_mod_wetlands_christmas = false
load_mod_wetlands_no_creeper = false
load_mod_pvp_arena = false
load_mod_chess = false
load_mod_celevator = false
load_mod_broom_racing = false
load_mod_auto_road_builder = false
load_mod_voxelibre_protection = false
load_mod_voxelibre_tv = false
load_mod_halloween_ghost = false
load_mod_halloween_zombies = false
load_mod_3dforniture = false
load_mod_mcl_decor = false
load_mod_mypark = false
load_mod_automobiles_lib = false
load_mod_mcl_potions_hotfix = false
load_mod_motorboat = false
load_mod_biofuel = false
load_mod_mobkit = false
