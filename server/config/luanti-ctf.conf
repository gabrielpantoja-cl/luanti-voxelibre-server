# ===========================================
# CONFIGURACION SERVIDOR CTF
# ===========================================
# Cuarto mundo: Capture The Flag de rubenwardy (MT-CTF/capturetheflag).
# Juego independiente de Luanti — NO usa VoxeLibre.
# El mapeo a puerto 30003 del host se define en docker-compose.yml.

# Informacion basica del servidor
server_name = CTF | Capture The Flag
server_description = Capture The Flag by rubenwardy. Swords, guns, grenades — captura la bandera del equipo enemigo.
motd = Bienvenid@ a CTF! Empieza una ronda automaticamente al entrar. Diviertete!
server_address = luanti.gabrielpantoja.cl
server_url = https://gabrielpantoja.cl
world_name = ctf
worldname = ctf

# No anunciar en lista publica (por ahora)
server_announce = false
server_keywords = ctf,capturetheflag,pvp,spanish

# Configuracion de red - el container escucha en 30000 internamente
bind_address = 0.0.0.0
port = 30000
max_users = 20
strict_protocol_version_checking = false

# === MODO SUPERVIVENCIA + COMBATE ===
creative_mode = false
enable_damage = true
enable_pvp = true
enable_fire = true
enable_tnt = false

# Juego
default_game = capturetheflag

# Mapgen: singlenode (el juego genera su propio terreno)
mg_name = singlenode

# Backend: dummy (recomendado para servidores publicos, no escribe mapa a disco)
backend = dummy

# Spawn
static_spawnpoint = 0,50,0
respawn_auto = true

# Seguridad
disallow_empty_password = false
secure.enable_security = true
disable_escape_sequences = true

# Chat
default_language = es
chat_message_format = <@name> @message
chat_message_max_size = 500

# Rendimiento
dedicated_server_step = 0.09
active_object_send_range_blocks = 4
active_block_range = 3
max_block_send_distance = 12
max_block_generate_distance = 10
time_speed = 0
num_emerge_threads = 2
server_unload_unused_data_timeout = 600

# Restricciones cliente
enable_client_modding = false
csm_restriction_flags = 63
csm_restriction_noderange = 0
max_simultaneous_block_sends_per_client = 40
max_simultaneous_block_sends_server_total = 40
server_map_save_interval = 60

# Mensajes
kick_msg_crash_msgqueue = "Error de conexion - reconectate en un momento"
kick_msg_shutdown = "CTF en mantenimiento - vuelve pronto"

# Logs
debug_log_level = warning
log_level = warning

# Administracion
name = gabo
admin_name = gabo
admin_privs = server,privs,ban,kick,teleport,give,settime,worldedit,fly,fast,noclip,debug

# Privilegios para nuevos jugadores
default_privs = interact,shout
