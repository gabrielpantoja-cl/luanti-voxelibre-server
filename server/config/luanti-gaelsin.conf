# ===========================================
# CONFIGURACION SERVIDOR GAELSIN
# ===========================================
# Mundo nuevo de supervivencia VoxeLibre puro, generado desde cero con
# seed = GAELSIN y mapgen v7. NO es copia de ningun mundo: VoxeLibre genera
# el mapa al primer arranque. PvP activo, mobs hostiles de noche, creepers
# bloqueados (mod wetlands_no_creeper), sin proteccion de areas.
# Nombre elegido por Gabriel. Reset via scripts/reset-gaelsin.sh.

# Informacion basica del servidor
server_name = GAELSIN | Supervivencia VoxeLibre
server_description = Mundo de supervivencia pura generado desde la semilla GAELSIN. PvP activo, mobs hostiles de noche. Sobrevive, explora y construye.
motd = Bienvenid@ a GAELSIN! Mundo de supervivencia. PvP activo, cuidado con la noche.
server_address = luanti.gabrielpantoja.cl
server_url = https://gabrielpantoja.cl
world_name = gaelsin
worldname = gaelsin

# Anunciar en lista publica (opcional - puede dejarse en false al inicio)
server_announce = false
server_keywords = survival,pvp,voxelibre,sandbox,spanish

# Configuracion de red - el container escucha en 30000 internamente
# El mapeo a puerto 30002 del host se define en docker-compose.yml
bind_address = 0.0.0.0
port = 30000
max_users = 15
strict_protocol_version_checking = false

# === MODO SUPERVIVENCIA ===
creative_mode = false
enable_damage = true
enable_pvp = true
enable_fire = true
enable_tnt = true
enable_rollback_recording = false
keepInventory = false

# VoxeLibre supervivencia pura
mcl_enable_creative_mode = false
mcl_creative_is_survival_like = false
give_initial_stuff = false
initial_stuff =

# Spawn
static_spawnpoint = 0,15,0
respawn_auto = true

# Seguridad
disallow_empty_password = false
secure.enable_security = true
secure.trusted_mods =
disable_escape_sequences = true

# Chat
default_language = es
chat_message_format = <@name> @message
chat_message_max_size = 500

# Rendimiento
dedicated_server_step = 0.09
active_object_send_range_blocks = 4
active_block_range = 2
max_block_send_distance = 8
max_block_generate_distance = 10
time_speed = 72
num_emerge_threads = 2
server_unload_unused_data_timeout = 600

# Mapgen - mundo nuevo generado desde seed "GAELSIN"
default_game = mineclone2
mg_name = v7
mg_flags = caves,light,decorations,biomes
fixed_map_seed = GAELSIN

# === MOBS - supervivencia estandar VoxeLibre ===
mobs_spawn = true
only_peaceful_mobs = false
mob_spawners_in_dungeons = true
mg_dungeons = true
mobs_griefing = true

# Anti-grief basico
max_objects_per_block = 256
max_forceloaded_blocks = 16

# Restricciones cliente (seguridad basica)
enable_client_modding = false
csm_restriction_flags = 63
csm_restriction_noderange = 0
max_simultaneous_block_sends_per_client = 6
max_simultaneous_block_sends_server_total = 40
client_unload_unused_data_timeout = 300
server_map_save_interval = 60

# Anti-spam suave
chat_message_count_per_player_per_5min = 100
kick_msg_crash_msgqueue = "Error de conexion - reconectate"
kick_msg_shutdown = "GAELSIN en mantenimiento - vuelve pronto"

# Logs
debug_log_level = warning
log_level = warning

# Administracion
name = gabo
admin_name = gabo
admin_privs = server,privs,ban,kick,teleport,give,settime,worldedit,fly,fast,noclip,debug,password,rollback_check

# ===========================================
# MODS HABILITADOS (set minimo - solo juego base + admin)
# Los privilegios de nuevos jugadores los da wetlands_gaelsin_newplayer
# (solo interact, shout - apropiado para supervivencia).
# ===========================================

# Jugadores nuevos (supervivencia: solo interact, shout)
load_mod_wetlands_gaelsin_newplayer = true

# Nucleo
load_mod_server_rules = true
load_mod_mcl_back_to_spawn = false  # Missing mcl_spawn dependency (igual que en Wetlands)
load_mod_wetlands_lastpos = true
# Obsoleto: el bug de invisibilidad ya está corregido en VoxeLibre 0.92.0
# (make_invisible valida luaentity). El hotfix sólo rompía las pociones y
# gastaba CPU con un globalstep por tick. Desactivado 2026-06-27.
load_mod_mcl_potions_hotfix = false

# Creepers bloqueados (decision del usuario)
load_mod_wetlands_no_creeper = true

# Skins
load_mod__world_folder_media = true
load_mod_mcl_custom_world_skins = true

# WorldEdit (admin para construir/reparar)
load_mod_worldedit = true
load_mod_worldedit_commands = true
load_mod_worldedit_shortcommands = true

# ===========================================
# KILL-SWITCHES - mods explicitamente OFF en GAELSIN
# ===========================================

# Privilegios de Wetlands (creativo/fly) - NO en supervivencia
load_mod_wetlands_newplayer = false

# Sin proteccion de areas (decision del usuario)
load_mod_voxelibre_protection = false
load_mod_protector = false
load_mod_area_protection = false

# Sin arena PvP (todo el mundo permite PvP)
load_mod_pvp_arena = false

# Sin NPCs/musica/decoracion/extras (set minimo)
load_mod_wetlands_npcs = false
load_mod_wetlands_music = false
load_mod_wetlands_christmas = false
load_mod_mypark = false
load_mod_3dforniture = false
load_mod_mcl_decor = false
load_mod_voxelibre_tv = false
load_mod_chess = false
load_mod_celevator = false
load_mod_auto_road_builder = false
load_mod_broom_racing = false

# Sin vehiculos
load_mod_automobiles_lib = false
load_mod_automobiles_vespa = false
load_mod_automobiles_beetle = false
load_mod_automobiles_motorcycle = false
load_mod_automobiles_buggy = false

# Sin Halloween
load_mod_halloween_ghost = false
load_mod_halloween_zombies = false
load_mod_wetlands_supreme_zombie = false

# Sin CTF guns (eso vive en Llanura CTF, puerto 30003)
load_mod_controls = false
load_mod_ctf_core = false
load_mod_rawf = false
load_mod_grenades = false
load_mod_ctf_ranged = false
load_mod_darkness_nerf = false

# Mods incompatibles con VoxeLibre (pin defensivo)
load_mod_motorboat = false
load_mod_biofuel = false
load_mod_mobkit = false
load_mod_animal_sanctuary = false
load_mod_creative_force = false
load_mod_home_teleport = false
load_mod_sethome = false
